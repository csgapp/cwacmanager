<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Family silhouette - more visible -->
  <g fill="#222222">
    <!-- Father -->
    <circle cx="30" cy="45" r="10"/>
    <rect x="25" y="55" width="10" height="20" rx="2"/>
    
    <!-- Mother -->
    <circle cx="70" cy="45" r="10"/>
    <rect x="65" y="55" width="10" height="20" rx="2"/>
    
    <!-- Child -->
    <circle cx="50" cy="50" r="8"/>
    <rect x="45" y="58" width="10" height="15" rx="2"/>
  </g>
  
  <!-- House roof (green) -->
  <polygon points="50,10 20,40 80,40" fill="#4CAF50"/>
  
  <!-- Orange heart/accent -->
  <path d="M50 65 Q52 62, 55 65 Q58 68, 50 75 Q42 68, 45 65 Q48 62, 50 65" fill="#FF9800"/>
</svg>